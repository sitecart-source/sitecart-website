kind = "web"
previewPath = "/"
title = "SITECART"
version = "1.0.0"
id = "artifacts/sitecart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19261

[services.development]
run = "pnpm --filter @workspace/sitecart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sitecart", "run", "build" ]
publicDir = "artifacts/sitecart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19261"
BASE_PATH = "/"
